schema_version: 1

id: php-layered
name: PHP layered
version: 0.1.0
description: >
  Vanilla PHP layered layout: Controller, Service, Repository, Model under src/.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [php]
  languages: [php]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
