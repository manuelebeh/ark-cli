schema_version: 1

id: hexagonal
name: Hexagonal
version: 0.1.0
description: >
  Domain at the center. Application defines ports.
  Adapters implement inbound (drivers) and outbound (driven) edges.
  Dependencies point inward.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [web, mobile, api, lib]
  languages: ["*"]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  denied-import: error
