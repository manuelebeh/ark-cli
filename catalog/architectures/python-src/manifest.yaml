schema_version: 1

id: python-src
name: Python src package
version: 0.1.0
description: >
  PyPA/uv-recommended src/ layout for libraries and CLIs without a web framework.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [python]
  languages: [python]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
