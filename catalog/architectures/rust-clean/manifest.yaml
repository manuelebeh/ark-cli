schema_version: 1

id: rust-clean
name: Rust clean architecture
version: 0.1.0
description: >
  Rust clean layers under src/: domain, application, infrastructure with main.rs as composition root.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [rust]
  languages: [rust]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
