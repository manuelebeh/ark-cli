naming:
  modules:
    pattern: "^[a-z][a-z0-9_]*$"
  files:
    components: "PascalCase"
    hooks: "^use[A-Z].*"
    tests: "**/*.{test,spec}.*"

placement:
  cross_module_imports: false
  public_api: features/:name/index.*

imports:
  deny:
    - from: features/*
      to: features/*/ui/**
    - from: features/*
      to: features/*/data/**
  allow:
    - from: features/*
      to: features/*/index.*
    - from: features/*
      to: shared/**

tests:
  colocate: true
