roots:
  required:
    - features/
    - shared/
  optional:
    - apps/
    - tooling/
    - docs/
    - src/

modules:
  path: features/:name
  required_children:
    - index.ts
  optional_children:
    - ui/
    - data/
    - domain/
    - api/
    - testing/
  forbid:
    - features/:name/features/

shared:
  path: shared/
  allow:
    - ui/**
    - lib/**
    - config/**
    - types/**
  forbid_globs:
    - shared/**/domain/**
    - shared/**/features/**

forbid:
  - src/components/**
  - src/services/**
  - features/index.ts

allow_exceptions_file: architecture.exceptions.yaml
