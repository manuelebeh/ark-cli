schema_version: 1

id: nuxt-feature
name: Nuxt feature-first
version: 0.1.0
description: >
  Nuxt app with domain features under app/features/<name> and shared cross-cutting code.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [vue, nuxt, web, typescript]
  languages: [typescript]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
