imports:
  deny:
    - from: src/domain/**
      to: src/application/**
    - from: src/domain/**
      to: src/adapters/**
    - from: src/application/**
      to: src/adapters/**
  allow:
    - from: src/application/**
      to: src/domain/**
    - from: src/adapters/**
      to: src/application/**
    - from: src/adapters/**
      to: src/domain/**
    - from: src/main.rs
      to: "**"
