schema_version: 1

id: nest-modules
name: NestJS feature modules
version: 0.1.0
description: >
  NestJS feature modules under src/{feature}/ (module + controller + service).

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [nest, typescript, api]
  languages: [typescript]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
