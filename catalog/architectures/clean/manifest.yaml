schema_version: 1

id: clean
name: Clean
version: 0.1.0
description: >
  Layered clean architecture: domain at the center, application use cases,
  infrastructure at the edge. Dependencies point inward only.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [web, mobile, api, lib]
  languages: ["*"]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  denied-import: error
