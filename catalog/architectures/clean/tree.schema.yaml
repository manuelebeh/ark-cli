roots:
  required:
    - domain/
    - application/
    - infrastructure/
  optional:
    - shared/
    - docs/
    - tooling/

shared:
  path: shared/
  allow:
    - lib/**
    - config/**
    - types/**

forbid:
  - src/components/**
  - src/services/**
  - features/**
  - adapters/**

allow_exceptions_file: architecture.exceptions.yaml
